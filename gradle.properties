# 2g, not 4g: this dev host has 5.8g RAM and no swap — a 4g Gradle heap grew to ~3.7g
# resident during R8 builds and triggered the kernel OOM killer (killed the whole session).
org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=768m -Dfile.encoding=UTF-8
org.gradle.daemon=false
android.useAndroidX=true
kotlin.code.style=official
