name: List Play tracks (diagnostic)

# One-off helper: prints the exact track names the Play Developer API exposes for this app,
# so the release workflow can target the automotive form-factor track by its real name.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - name: List tracks
        env:
          SA_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          pip install --quiet google-auth google-api-python-client
          python - <<'PY'
          import json, os
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          info = json.loads(os.environ["SA_JSON"])
          creds = service_account.Credentials.from_service_account_info(
              info, scopes=["https://www.googleapis.com/auth/androidpublisher"])
          svc = build("androidpublisher", "v3", credentials=creds)
          pkg = "com.magter.retrofm"
          edit = svc.edits().insert(packageName=pkg, body={}).execute()["id"]
          try:
              tracks = svc.edits().tracks().list(packageName=pkg, editId=edit).execute()
              for t in tracks.get("tracks", []):
                  codes = [r.get("versionCodes") for r in t.get("releases", [])]
                  print(f"TRACK: {t['track']}   releases={codes}")
          finally:
              svc.edits().delete(packageName=pkg, editId=edit).execute()
          PY
