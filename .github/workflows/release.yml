name: Release to Play internal testing

# Deliberate releases only: push a v* tag (e.g. `git tag v1.0.21 && git push origin v1.0.21`)
# or trigger manually from the Actions tab. Never fires on ordinary commits.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Ensure API 36 platform
        run: sdkmanager "platforms;android-36"

      - name: Decode upload keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/upload.jks"

      # versionCode is derived from the run number: phone stays < 1000, automotive in the
      # dedicated 1100+ range — unique across the shared Play listing, no manual bump needed.
      - name: Build signed release bundles
        env:
          STORE_PW: ${{ secrets.RETROFM_UPLOAD_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEY_PW: ${{ secrets.RETROFM_UPLOAD_KEY_PASSWORD }}
          LOGSINK_KEY: ${{ secrets.LOGSINK_KEY }}
        run: |
          chmod +x ./gradlew
          ./gradlew :app:bundleRelease :automotive:bundleRelease \
            -PRETROFM_UPLOAD_STORE_FILE="$RUNNER_TEMP/upload.jks" \
            -PRETROFM_UPLOAD_STORE_PASSWORD="$STORE_PW" \
            -PRETROFM_UPLOAD_KEY_ALIAS="$KEY_ALIAS" \
            -PRETROFM_UPLOAD_KEY_PASSWORD="$KEY_PW" \
            -PRETROFM_LOGSINK_KEY="$LOGSINK_KEY" \
            -PRETROFM_PHONE_VERSION_CODE="$((100 + GITHUB_RUN_NUMBER))" \
            -PRETROFM_AUTO_VERSION_CODE="$((1100 + GITHUB_RUN_NUMBER))"

      # Both AABs are always downloadable from the run, regardless of what gets released.
      - name: Upload bundles as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aab-bundles
          path: |
            app/build/outputs/bundle/release/*.aab
            automotive/build/outputs/bundle/release/*.aab

      # Phone and automotive are DISTINCT form-factor tracks: the standard `internal` track
      # rejects an AAB requiring android.hardware.type.automotive ("features not allowed on
      # this track"), so they cannot share a release. Separate steps to separate tracks — no
      # clobber, since each commits to its own track.
      - name: Release phone AAB to internal testing
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.magter.retrofm
          releaseFiles: app/build/outputs/bundle/release/*.aab
          track: internal
          status: completed

      # Automotive form-factor track. Its API name is discovered via the list-tracks workflow
      # and set as the AUTOMOTIVE_TRACK repo variable. Until set, the car AAB is available as
      # the run artifact above and this step reports (not silently skips).
      - name: Release automotive AAB to its form-factor track
        if: vars.AUTOMOTIVE_TRACK != ''
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.magter.retrofm
          releaseFiles: automotive/build/outputs/bundle/release/*.aab
          track: ${{ vars.AUTOMOTIVE_TRACK }}
          status: completed

      - name: Note automotive not released
        if: vars.AUTOMOTIVE_TRACK == ''
        run: echo "::warning::AUTOMOTIVE_TRACK repo variable is not set — automotive AAB built and attached as an artifact but NOT released. Run the 'List Play tracks' workflow to find the track name, then set the variable."
